<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SHORTA Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b1a2f; color:white; font-family:Arial; padding:20px; }
.card { background:#1e2d4a; padding:20px; border-radius:10px; margin-bottom:20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; }
</style>
</head>

<body>

<h1>Dashboard Salon</h1>

<div id="kpis" class="grid"></div>

<div class="card">
<h2>Satisfaction</h2>
<div id="satisfaction"></div>
</div>

<script>

const supabase = window.supabase.createClient(
'https://ooqgocqdggxcgnzhxjil.supabase.co',
'sb_publishable_IXKLxFLH3kUhLiabQVsVKg_oXNC4jLu'
)

const salonCode = new URLSearchParams(window.location.search).get('salon')

async function load(){

// 1️⃣ salon
const { data: salon } = await supabase
.from('salons')
.select('*')
.eq('salon_code', salonCode)
.single()

// 2️⃣ events
const { data: events } = await supabase
.from('events')
.select('*')
.eq('salon_id', salon.id)

// 3️⃣ review history
const { data: reviews } = await supabase
.from('review_history')
.select('*')
.eq('salon_id', salon.id)
.order('captured_at', { ascending: true })

// 🔥 LOGIQUE CORRIGÉE

let happy = 0
let neutral = 0
let sad = 0

events.forEach(e => {

if(e.event_type === 'emoji_click'){

// ⚠️ ici on suppose que tu as une info quelque part
// sinon on considère que emoji_click = happy

happy++

}

if(e.event_type === 'feedback_submit'){
sad++
}

})

// KPI
document.getElementById('kpis').innerHTML = `
<div class="card">Avis Google<br><b>${reviews.length ? reviews[reviews.length-1].review_count : 0}</b></div>
<div class="card">Events<br><b>${events.length}</b></div>
<div class="card">Négatif<br><b>${sad}</b></div>
<div class="card">Happy<br><b>${happy}</b></div>
`

// satisfaction
const total = happy + neutral + sad

document.getElementById('satisfaction').innerHTML = `
😀 ${Math.round((happy/total)*100)||0}%<br>
😐 ${Math.round((neutral/total)*100)||0}%<br>
😞 ${Math.round((sad/total)*100)||0}%
`

}

load()

</script>

</body>
</html>
