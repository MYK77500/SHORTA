<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHORTA — Dashboard Salon Debug Final</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #08142b;
      color: #fff;
      padding: 24px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 44px;
    }
    .subtitle {
      color: #9fb0d1;
      margin-bottom: 20px;
      font-size: 18px;
    }
    .card {
      background: #1c2942;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }
    .kpi {
      background: #1c2942;
      border-radius: 16px;
      padding: 20px;
    }
    .kpi-label {
      color: #9fb0d1;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .kpi-value {
      font-size: 34px;
      font-weight: bold;
    }
    .ok { color: #4ade80; }
    .bad { color: #f87171; }
    .mono {
      font-family: Menlo, Monaco, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.5;
      background: #0f1a2d;
      padding: 14px;
      border-radius: 12px;
      overflow-x: auto;
      min-height: 60px;
    }
    .error-box {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fecaca;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .success-box {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: #bbf7d0;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 18px;
      display: none;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard Salon</h1>
    <div class="subtitle" id="subtitle">Initialisation…</div>

    <div id="errorBox" class="error-box"></div>
    <div id="successBox" class="success-box"></div>

    <div class="grid" id="kpis">
      <div class="kpi">
        <div class="kpi-label">Salon trouvé</div>
        <div class="kpi-value">...</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Events</div>
        <div class="kpi-value">...</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Review history</div>
        <div class="kpi-value">...</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avis Google actuel</div>
        <div class="kpi-value">...</div>
      </div>
    </div>

    <div class="card">
      <h2>Logs</h2>
      <div id="logBox" class="mono">Aucun log pour le moment…</div>
    </div>

    <div class="card">
      <h2>Résultat table salons</h2>
      <div id="salonsBox" class="mono">Chargement…</div>
    </div>

    <div class="card">
      <h2>Résultat table events</h2>
      <div id="eventsBox" class="mono">Chargement…</div>
    </div>

    <div class="card">
      <h2>Résultat table review_history</h2>
      <div id="reviewsBox" class="mono">Chargement…</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ooqgocqdggxcgnzhxjil.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_IXKLxFLH3kUhLiabQVsVKg_oXNC4jLu';

    const logLines = [];

    function addLog(message, data = null) {
      let line = message;
      if (data !== null) {
        try {
          line += '\n' + JSON.stringify(data, null, 2);
        } catch (e) {
          line += '\n' + String(data);
        }
      }
      logLines.push(line);
      document.getElementById('logBox').textContent = logLines.join('\n\n----------------\n\n');
      console.log(message, data || '');
    }

    function showError(message, data = null) {
      const box = document.getElementById('errorBox');
      let content = message;
      if (data !== null) {
        try {
          content += '\n\n' + JSON.stringify(data, null, 2);
        } catch (e) {
          content += '\n\n' + String(data);
        }
      }
      box.style.display = 'block';
      box.textContent = content;
      addLog('ERREUR', { message, data });
    }

    function showSuccess(message) {
      const box = document.getElementById('successBox');
      box.style.display = 'block';
      box.textContent = message;
      addLog('SUCCÈS', { message });
    }

    window.onerror = function(message, source, lineno, colno, error) {
      showError('Erreur JavaScript capturée par window.onerror', {
        message,
        source,
        lineno,
        colno,
        stack: error && error.stack ? error.stack : null
      });
    };

    window.addEventListener('unhandledrejection', function(event) {
      showError('Promesse rejetée non gérée', {
        reason: event.reason && event.reason.message ? event.reason.message : event.reason,
        stack: event.reason && event.reason.stack ? event.reason.stack : null
      });
    });

    async function start() {
      try {
        document.getElementById('subtitle').textContent = 'Lecture des paramètres URL…';

        const params = new URLSearchParams(window.location.search);
        const salonCode = params.get('salon');

        addLog('Paramètre salon récupéré', { salonCode });

        if (!salonCode) {
          showError('Paramètre URL manquant. Il faut ouvrir la page avec ?salon=CHELLES_TEST');
          return;
        }

        document.getElementById('subtitle').textContent = 'Initialisation Supabase…';

        const supabaseGlobal = window.supabase || self.supabase;

        if (!supabaseGlobal) {
          showError('La librairie Supabase ne s’est pas chargée. window.supabase est introuvable.');
          return;
        }

        addLog('Librairie Supabase détectée', Object.keys(supabaseGlobal));

        if (typeof supabaseGlobal.createClient !== 'function') {
          showError('createClient est introuvable dans la librairie Supabase', {
            availableKeys: Object.keys(supabaseGlobal)
          });
          return;
        }

        const client = supabaseGlobal.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        addLog('Client Supabase créé avec succès');

        document.getElementById('subtitle').textContent = 'Lecture table salons…';

        const salonsResponse = await client
          .from('salons')
          .select('*')
          .eq('salon_code', salonCode);

        addLog('Réponse salons brute', salonsResponse);

        if (salonsResponse.error) {
          showError('Erreur Supabase sur la table salons', salonsResponse.error);
          return;
        }

        document.getElementById('salonsBox').textContent = JSON.stringify(salonsResponse.data, null, 2);

        document.getElementById('subtitle').textContent = 'Lecture table events…';

        const eventsResponse = await client
          .from('events')
          .select('*')
          .eq('salon_code', salonCode);

        addLog('Réponse events brute', eventsResponse);

        if (eventsResponse.error) {
          showError('Erreur Supabase sur la table events', eventsResponse.error);
          return;
        }

        document.getElementById('eventsBox').textContent = JSON.stringify(eventsResponse.data, null, 2);

        document.getElementById('subtitle').textContent = 'Lecture table review_history…';

        const reviewsResponse = await client
          .from('review_history')
          .select('*')
          .eq('salon_code', salonCode);

        addLog('Réponse review_history brute', reviewsResponse);

        if (reviewsResponse.error) {
          showError('Erreur Supabase sur la table review_history', reviewsResponse.error);
          return;
        }

        document.getElementById('reviewsBox').textContent = JSON.stringify(reviewsResponse.data, null, 2);

        const salons = salonsResponse.data || [];
        const events = eventsResponse.data || [];
        const reviews = reviewsResponse.data || [];

        let currentReviews = 0;
        if (reviews.length > 0) {
          const last = reviews[reviews.length - 1];
          currentReviews =
            Number(last.count ?? last.review_count ?? last.total_reviews ?? last.google_reviews ?? 0) || 0;
        }

        document.getElementById('kpis').innerHTML = `
          <div class="kpi">
            <div class="kpi-label">Salon trouvé</div>
            <div class="kpi-value ${salons.length > 0 ? 'ok' : 'bad'}">${salons.length > 0 ? 'OUI' : 'NON'}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Events</div>
            <div class="kpi-value">${events.length}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Review history</div>
            <div class="kpi-value">${reviews.length}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Avis Google actuel</div>
            <div class="kpi-value">${currentReviews}</div>
          </div>
        `;

        document.getElementById('subtitle').textContent = 'Chargement terminé';
        showSuccess('Le script s’est exécuté jusqu’au bout. Si les blocs sont vides, ce n’est plus un bug JS mais un problème de données enregistrées.');
      } catch (error) {
        showError('Erreur générale dans start()', {
          message: error.message,
          stack: error.stack
        });
      }
    }

    start();
  </script>
</body>
</html>
