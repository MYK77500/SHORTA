<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHORTA</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      text-align: center;
    }

    .logo {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 2px;
      margin: 0 0 16px 0;
    }

    .subtitle {
      font-size: 28px;
      color: #222222;
      margin: 0 0 50px 0;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .emoji-btn {
      border: none;
      border-radius: 28px;
      width: 190px;
      height: 190px;
      font-size: 82px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.14);
    }

    .emoji-btn:hover {
      transform: scale(1.04);
    }

    .emoji-btn:active {
      transform: scale(0.98);
    }

    .emoji-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .happy {
      background: #22c55e;
    }

    .neutral {
      background: #f59e0b;
    }

    .sad {
      background: #ef4444;
    }

    #status {
      min-height: 28px;
      font-size: 18px;
      font-weight: 600;
      color: #222222;
      margin-top: 8px;
    }

    .hidden {
      display: none !important;
    }

    .error-box {
      margin: 22px auto 0 auto;
      max-width: 760px;
      background: #fff4f4;
      border: 1px solid #f1b5b5;
      color: #8a1f1f;
      border-radius: 14px;
      padding: 16px;
      text-align: left;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    @media (max-width: 700px) {
      .logo {
        font-size: 42px;
      }

      .subtitle {
        font-size: 22px;
        margin-bottom: 36px;
      }

      .emoji-btn {
        width: 145px;
        height: 145px;
        font-size: 62px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">SHORTA</div>
    <p class="subtitle">Comment s’est passée votre visite ?</p>

    <div id="buttons" class="buttons hidden">
      <button class="emoji-btn happy" data-value="happy">😀</button>
      <button class="emoji-btn neutral" data-value="neutral">😐</button>
      <button class="emoji-btn sad" data-value="sad">😞</button>
    </div>

    <div id="status">Chargement...</div>

    <div id="errorBox" class="error-box"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://ooqgocqdggxcgnzhxjil.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_IXKLxFLH3kUhLiabQVsVKg_oXNC4jLu'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const statusEl = document.getElementById('status')
    const buttonsWrapEl = document.getElementById('buttons')
    const errorBoxEl = document.getElementById('errorBox')
    const buttons = document.querySelectorAll('.emoji-btn')

    let currentSalon = null
    let currentDevice = null
    let currentSalonCode = null
    let currentDeviceCode = null

    function setStatus(message) {
      statusEl.textContent = message
    }

    function showError(message) {
      errorBoxEl.style.display = 'block'
      errorBoxEl.textContent = message
      console.error(message)
    }

    function hideError() {
      errorBoxEl.style.display = 'none'
      errorBoxEl.textContent = ''
    }

    function setButtonsDisabled(disabled) {
      buttons.forEach((button) => {
        button.disabled = disabled
      })
    }

    function showButtons() {
      buttonsWrapEl.classList.remove('hidden')
    }

    function parseKioskUrl() {
      const path = window.location.pathname
      const parts = path.split('/').filter(Boolean)

      if (parts.length !== 3 || parts[0] !== 'kiosk') {
        throw new Error('URL invalide pour la borne.')
      }

      return {
        salonCode: decodeURIComponent(parts[1]),
        deviceCode: decodeURIComponent(parts[2])
      }
    }

    async function fetchSalonByCode(salonCode) {
      const { data, error } = await supabase
        .from('salons')
        .select('id, salon_code, name, city, is_active')
        .eq('salon_code', salonCode)
        .single()

      if (error) {
        throw new Error('Salon introuvable : ' + error.message)
      }

      if (!data.is_active) {
        throw new Error('Ce salon est désactivé.')
      }

      return data
    }

    async function fetchDeviceByCode(salonId, deviceCode) {
      const { data, error } = await supabase
        .from('devices')
        .select('id, device_code, label, is_active')
        .eq('salon_id', salonId)
        .eq('device_code', deviceCode)
        .single()

      if (error) {
        throw new Error('Device introuvable : ' + error.message)
      }

      if (!data.is_active) {
        throw new Error('Ce device est désactivé.')
      }

      return data
    }

    async function boot() {
      try {
        hideError()
        setStatus('Chargement...')

        const { salonCode, deviceCode } = parseKioskUrl()
        currentSalonCode = salonCode
        currentDeviceCode = deviceCode

        const salon = await fetchSalonByCode(salonCode)
        const device = await fetchDeviceByCode(salon.id, deviceCode)

        currentSalon = salon
        currentDevice = device

        showButtons()
        setStatus('')
      } catch (error) {
        setStatus('Erreur')
        showError(error.message)
      }
    }

    async function sendEvent(value) {
      if (!currentSalon || !currentDevice) {
        setStatus('Erreur')
        showError('Impossible d’envoyer l’événement : salon ou device non chargé.')
        return
      }

      hideError()
      setStatus('Envoi...')
      setButtonsDisabled(true)

      try {
        const eventRow = {
          salon_id: currentSalon.id,
          device_id: currentDevice.id,
          event_type: 'emoji_click',
          event_value: value,
          payload: {
            source: 'kiosk',
            screen: 'home',
            button: value,
            salon_code: currentSalonCode,
            device_code: currentDeviceCode,
            page_path: window.location.pathname,
            page_url: window.location.href,
            user_agent: navigator.userAgent
          }
        }

        const { error } = await supabase
          .from('events')
          .insert([eventRow])

        if (error) {
          throw new Error(error.message)
        }

        setStatus('Merci pour votre retour')
      } catch (error) {
        setStatus('Erreur')
        showError('Erreur Supabase : ' + error.message)
      } finally {
        setButtonsDisabled(false)
      }
    }

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        const value = button.getAttribute('data-value')
        sendEvent(value)
      })
    })

    boot()
  </script>
</body>
</html>
