<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SHORTA Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0b1a2f; color:white; font-family:Arial; padding:20px; }
.card { background:#1e2d4a; padding:20px; border-radius:10px; margin-bottom:20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; }
h1 { margin-bottom:20px; }
h2 { margin-bottom:10px; }
</style>
</head>

<body>

<h1>Dashboard Salon</h1>

<div id="kpis" class="grid"></div>

<div class="card">
<h2>Evolution avis Google</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Satisfaction client</h2>
<div id="satisfaction"></div>
</div>

<div class="card">
<h2>Activité récente</h2>
<div id="activity"></div>
</div>

<div class="card">
<h2>Résumé business</h2>
<div id="summary"></div>
</div>

<script>

const supabase = window.supabase.createClient(
'https://ooqgocqdggxcgnzhxjil.supabase.co',
'sb_publishable_IXKLxFLH3kUhLiabQVsVKg_oXNC4jLu'
)

const salonCode = new URLSearchParams(window.location.search).get('salon')

async function load(){

// 1️⃣ salon
const { data: salon } = await supabase
.from('salons')
.select('*')
.eq('salon_code', salonCode)
.single()

// 2️⃣ events
const { data: events } = await supabase
.from('events')
.select('*')
.eq('salon_id', salon.id)

// 3️⃣ review history
const { data: reviews } = await supabase
.from('review_history')
.select('*')
.eq('salon_id', salon.id)
.order('captured_at', { ascending: true })

// ================= KPI =================

let happy = 0
let sad = 0

events.forEach(e => {
if(e.event_type === 'emoji_click') happy++
if(e.event_type === 'feedback_submit') sad++
})

const total = happy + sad

// ================= AFFICHAGE KPI =================

document.getElementById('kpis').innerHTML = `
<div class="card">Avis Google<br><b>${reviews.length ? reviews[reviews.length-1].review_count : 0}</b></div>
<div class="card">Events<br><b>${events.length}</b></div>
<div class="card">Feedback négatif<br><b>${sad}</b></div>
<div class="card">Satisfaction<br><b>${total ? Math.round((happy/total)*100) : 0}%</b></div>
`

// ================= SATISFACTION =================

document.getElementById('satisfaction').innerHTML = `
😀 ${total ? Math.round((happy/total)*100) : 0}%<br>
😞 ${total ? Math.round((sad/total)*100) : 0}%
`

// ================= GRAPH =================

const labels = reviews.map(r => new Date(r.captured_at).toLocaleDateString())
const data = reviews.map(r => r.review_count)

new Chart(document.getElementById('chart'), {
type: 'line',
data: {
labels,
datasets: [{
label: 'Avis Google',
data,
borderWidth: 2
}]
}
})

// ================= ACTIVITÉ =================

const map = {}

events.forEach(e=>{
const d = new Date(e.created_at).toLocaleDateString()
map[d] = (map[d] || 0) + 1
})

let html = ""

Object.entries(map).slice(-7).forEach(([d,c])=>{
html += `${d} : ${c} events<br>`
})

document.getElementById('activity').innerHTML = html

// ================= SUMMARY =================

document.getElementById('summary').innerHTML = `
Avis actuels : ${reviews.length ? reviews[reviews.length-1].review_count : 0}<br>
Volume clients : ${events.length}<br>
Satisfaction : ${total ? Math.round((happy/total)*100) : 0}%<br>
Risque : ${sad > 0 ? "⚠️ clients insatisfaits" : "RAS"}
`

}

load()

</script>

</body>
</html>
