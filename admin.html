<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SHORTA Admin</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding:20px; }
h1 { margin-bottom:20px; }
button { cursor:pointer; }

.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; }

input { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; }

.btn { background:black; color:white; padding:12px 16px; border:none; border-radius:10px; }

.salon { background:white; padding:15px; border-radius:10px; margin-bottom:10px; }
</style>
</head>

<body>

<h1>SHORTA Admin</h1>

<div class="card">
  <h2>Créer un salon</h2>

  <input id="name" placeholder="Nom du salon">
  <input id="city" placeholder="Ville">
  <input id="google_url" placeholder="Lien Google avis">

  <button class="btn" onclick="createSalon()">Créer</button>

  <p id="result"></p>
</div>

<div class="card">
  <h2>Salons</h2>
  <div id="list"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://ooqgocqdggxcgnzhxjil.supabase.co',
  'sb_publishable_IXKLxFLH3kUhLiabQVsVKg_oXNC4jLu'
)

window.createSalon = async () => {

  const name = document.getElementById('name').value
  const city = document.getElementById('city').value
  const google = document.getElementById('google_url').value

  if(!name || !city || !google){
    alert("Remplis tous les champs")
    return
  }

  const salon_code = name.toUpperCase().replace(/ /g,'_') + "_" + Math.floor(Math.random()*1000)

  // CREATE SALON
  const { data: salon, error } = await supabase
    .from('salons')
    .insert([{
      name,
      city,
      salon_code,
      google_review_url: google,
      is_active: true
    }])
    .select()
    .single()

  if(error){
    alert(error.message)
    return
  }

  // CREATE DEVICE
  await supabase.from('devices').insert([{
    salon_id: salon.id,
    device_code: 'TAB01',
    label: 'Tablette 1',
    is_active: true
  }])

  const link = `https://shorta-339p.vercel.app/kiosk/${salon_code}/TAB01`

  document.getElementById('result').innerHTML = `
    ✅ Salon créé<br><br>
    👉 Lien borne :<br>
    <b>${link}</b>
  `

  loadSalons()
}

async function loadSalons(){
  const { data } = await supabase.from('salons').select('*').order('created_at',{ascending:false})

  document.getElementById('list').innerHTML = data.map(s => `
    <div class="salon">
      <b>${s.name}</b><br>
      ${s.city}<br>
      ${s.salon_code}
    </div>
  `).join('')
}

loadSalons()
</script>

</body>
</html>
